<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenz Admin</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #ffffff; --bg2: #f7f7f7; --bg3: #efefef;
  --border: #d8d8d8; --text: #111111; --t2: #444444; --t3: #888888;
  --blue: #1a56db; --blue-bg: #eef3ff;
  --green: #057a55; --green-bg: #e8f8f0;
  --amber: #b45309; --amber-bg: #fef3c7;
  --red: #c81e1e; --red-bg: #fde8e8;
  --purple: #6c2bd9; --purple-bg: #f3eeff;
}
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased; }

/* AUTH */
.auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.auth-box { border: 2px solid var(--text); padding: 48px 56px; width: 380px; text-align: center; }
.auth-logo { font-size: 36px; font-weight: 700; letter-spacing: -2px; margin-bottom: 6px; }
.auth-logo span { color: var(--blue); }
.auth-sub { font-size: 11px; color: var(--t3); margin-bottom: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
.auth-input { width: 100%; border: 2px solid var(--text); padding: 12px 16px; font-family: inherit; font-size: 15px; outline: none; margin-bottom: 12px; }
.auth-input:focus { border-color: var(--blue); }
.auth-btn { width: 100%; background: var(--text); color: white; border: none; padding: 12px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
.auth-btn:hover { opacity: 0.85; }
.auth-err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

/* LAYOUT */
.page { max-width: 1400px; margin: 0 auto; padding: 0 32px 60px; display: none; }

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; padding: 28px 0 24px; border-bottom: 2px solid var(--text); margin-bottom: 24px; }
.logo { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
.logo span { color: var(--blue); }
.logo-badge { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1.5px; margin-left: 10px; vertical-align: middle; }
.header-right { display: flex; align-items: center; gap: 16px; }
.ts { font-size: 13px; color: var(--t3); font-family: 'IBM Plex Mono', monospace; }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.btn-grp { display: flex; border: 2px solid var(--text); overflow: hidden; }
.btn-grp button { background: var(--bg); border: none; border-right: 2px solid var(--text); padding: 8px 16px; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--t2); cursor: pointer; transition: background 0.1s; white-space: nowrap; }
.btn-grp button:last-child { border-right: none; }
.btn-grp button:hover { background: var(--bg2); }
.btn-grp button.on { background: var(--text); color: white; }
.search-wrap { position: relative; margin-left: auto; }
.search-wrap input { background: var(--bg); border: 2px solid var(--text); padding: 8px 14px 8px 36px; font-family: inherit; font-size: 14px; color: var(--text); outline: none; width: 260px; }
.search-wrap input:focus { border-color: var(--blue); }
.search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 14px; pointer-events: none; }

/* STATS */
.stats { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
.stat { font-size: 13px; color: var(--t3); }
.stat strong { color: var(--text); font-weight: 700; }

/* TABLE */
.tbl-wrap { border: 2px solid var(--text); overflow: auto; max-height: calc(100vh - 240px); }
table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; z-index: 10; }
th { background: var(--text); color: white; padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; cursor: pointer; user-select: none; border-right: 1px solid rgba(255,255,255,0.15); }
th:last-child { border-right: none; }
th:hover { background: #222; }
th.sorted { background: var(--blue); }
th .sort-ico { margin-left: 4px; opacity: 0.6; }
th.sorted .sort-ico { opacity: 1; }

td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg2); }
tr.banned td { opacity: 0.35; }

.td-phrase { font-weight: 600; color: var(--text); max-width: 280px; }
.td-cat { color: var(--t3); font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
.td-num { font-family: 'IBM Plex Mono', monospace; font-size: 13px; white-space: nowrap; }
.td-num.green { color: var(--green); font-weight: 600; }
.td-num.blue { color: var(--blue); }
.td-actions { white-space: nowrap; text-align: right; }

.tag { font-size: 10px; font-weight: 700; padding: 2px 7px; text-transform: uppercase; letter-spacing: 0.3px; display: inline-block; }
.tag-empty { background: var(--green-bg); color: var(--green); }
.tag-free { background: var(--blue-bg); color: var(--blue); }

.act-btn { font-family: inherit; font-size: 11px; font-weight: 700; color: var(--t3); background: transparent; border: 1.5px solid var(--border); padding: 3px 8px; cursor: pointer; letter-spacing: 0.3px; text-transform: uppercase; transition: all 0.12s; margin-left: 4px; }
.act-btn:hover.junk { border-color: var(--red); color: var(--red); }
.act-btn:hover.brand { border-color: var(--purple); color: var(--purple); }
.act-btn.done { background: var(--green); color: white; border-color: var(--green); }

.empty-row td { text-align: center; padding: 60px; color: var(--t3); font-size: 15px; }

/* LOADING */
.loading { text-align: center; padding: 80px; }
.spin { width: 24px; height: 24px; margin: 0 auto 12px; border: 3px solid var(--bg3); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">tren<span>z</span></div>
    <div class="auth-sub">Admin Panel</div>
    <input class="auth-input" type="password" id="authPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')checkAuth()">
    <button class="auth-btn" onclick="checkAuth()">Войти</button>
    <div class="auth-err" id="authErr">Неверный пароль</div>
  </div>
</div>

<div class="page" id="mainPage">
  <div class="header">
    <div>
      <span class="logo">tren<span>z</span></span>
      <span class="logo-badge">Admin</span>
    </div>
    <div class="header-right">
      <span class="ts" id="ts">—</span>
    </div>
  </div>

  <div id="loadingEl" class="loading"><div class="spin"></div><div style="color:var(--t3);font-size:14px;">Загрузка данных...</div></div>

  <div id="mainContent" style="display:none">
    <div class="toolbar">
      <div class="btn-grp">
        <button class="on" id="b-all" onclick="setBrand('no_brand',this)">Небрендовые</button>
        <button id="b-yes" onclick="setBrand('all',this)">+ Бренды</button>
      </div>
      <div class="btn-grp">
        <button class="on" onclick="setSort('request_count',this)">Запросы ↓</button>
        <button onclick="setSort('concurrency',this)">Конкуренция ↑</button>
        <button onclick="setSort('cards_count',this)">Карточки ↑</button>
      </div>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="sq" placeholder="Поиск по фразе..." oninput="draw()">
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th onclick="setSort('request_count',null)" id="th-req">Запросов/мес <span class="sort-ico">↓</span></th>
            <th onclick="setSort('cards_count',null)" id="th-cards">Карточек <span class="sort-ico">↕</span></th>
            <th onclick="setSort('concurrency',null)" id="th-conc">Конкуренция <span class="sort-ico">↕</span></th>
            <th>Фраза</th>
            <th>Категория</th>
            <th>Тип</th>
            <th style="width:160px">Действия</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const ADMIN_PASS = 'trenz2026admin';
const GIST_URL = 'https://gist.githubusercontent.com/Igoroding/114c03bcf98115a54fd6e72fecd28656/raw/trenz_data.json';
const BLACKLIST_URL = 'https://raw.githubusercontent.com/Igoroding/Trenz-Dashboard/main/blacklist.json';
const BRANDS_URL = 'https://raw.githubusercontent.com/Igoroding/Trenz-Dashboard/main/brands_blacklist.json';
const WEBHOOK = 'https://wbtrenz.app.n8n.cloud/webhook/trenz-blacklist';

let niches = [], sort = 'request_count', sortAsc = false, brandFilter = 'no_brand';
let BLACKLIST = new Set(), BRANDS = new Set();

function checkAuth() {
  if (document.getElementById('authPass').value === ADMIN_PASS) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    sessionStorage.setItem('trenz_auth', '1');
    loadAll();
  } else {
    document.getElementById('authErr').style.display = 'block';
  }
}
document.getElementById('authPass').addEventListener('keydown', e => { if(e.key==='Enter') checkAuth(); });
if (sessionStorage.getItem('trenz_auth') === '1') {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainPage').style.display = 'block';
  document.addEventListener('DOMContentLoaded', loadAll);
}

async function loadAll() {
  const t = Date.now();
  const [data, junk, brands] = await Promise.all([
    fetch(GIST_URL + '?t=' + t).then(r => r.json()).catch(() => null),
    fetch(BLACKLIST_URL + '?t=' + t).then(r => r.json()).catch(() => []),
    fetch(BRANDS_URL + '?t=' + t).then(r => r.json()).catch(() => [])
  ]);
  BLACKLIST = new Set(junk.map(s => s.toLowerCase().trim()));
  BRANDS = new Set(brands.map(s => s.toLowerCase().trim()));
  if (data) {
    niches = data.niches || [];
    if (data.updated_at) {
      const d = new Date(data.updated_at);
      document.getElementById('ts').textContent = d.toLocaleString('ru', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    }
  }
  document.getElementById('loadingEl').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  draw();
}

const isJunk = p => {
  const s = (p||'').toLowerCase().trim();
  if (BLACKLIST.has(s)) return true;
  const CONTAINS = ['мои покупки','мои заказы','мой заказ','посылка','авиабилет','квартира','рубли за отзыв','личный кабинет','статус заказа','возврат товар','служба поддержки','пункт выдачи'];
  return CONTAINS.some(k => s.includes(k));
};
const isBrandBanned = p => BRANDS.has((p||'').toLowerCase().trim());
const fmt = n => Number(n).toLocaleString('ru');
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');

function draw() {
  const q = document.getElementById('sq').value.toLowerCase();
  let list = niches.filter(n => {
    if (isJunk(n.phrase||'')) return false;
    if (isBrandBanned(n.phrase||'')) return false;
    if (brandFilter === 'no_brand' && n.is_brand) return false;
    if (q && !n.phrase?.toLowerCase().includes(q) && !n.category?.toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a, b) => {
    const av = parseFloat(a[sort]||0), bv = parseFloat(b[sort]||0);
    return sortAsc ? av - bv : bv - av;
  });

  const empty = list.filter(n => parseInt(n.cards_count||0) <= 5).length;
  const free = list.filter(n => { const c = parseInt(n.cards_count||0); return c > 5 && c <= 100; }).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat">Всего: <strong>${list.length}</strong></div>
    <div class="stat">Пустых (≤5): <strong style="color:var(--green)">${empty}</strong></div>
    <div class="stat">Свободных (≤100): <strong style="color:var(--blue)">${free}</strong></div>
    <div class="stat">В блэклисте: <strong>${BLACKLIST.size + BRANDS.size}</strong></div>
  `;

  const tbody = document.getElementById('tbody');
  if (!list.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Ничего не найдено</td></tr>';
    return;
  }

  tbody.innerHTML = list.map((n, i) => {
    const cards = parseInt(n.cards_count||0);
    const req = parseInt(n.request_count||0);
    const c = parseFloat(n.concurrency||0);
    const cardCls = cards <= 5 ? 'green' : 'blue';
    const nicheTag = cards <= 5
      ? '<span class="tag tag-empty">Пустая</span>'
      : '<span class="tag tag-free">Свободная</span>';
    return `<tr id="row-${i}">
      <td class="td-num" style="color:var(--t3)">${i+1}</td>
      <td class="td-num">${fmt(req)}</td>
      <td class="td-num ${cardCls}">${fmt(cards)}</td>
      <td class="td-num">${c.toFixed(4)}</td>
      <td class="td-phrase">${esc(n.phrase||'')}</td>
      <td class="td-cat">${esc(n.category||'—')}</td>
      <td>${nicheTag}${n.is_brand ? ' <span class="tag" style="background:var(--purple-bg);color:var(--purple)">Бренд</span>' : ''}</td>
      <td class="td-actions">
        <button class="act-btn junk" onclick="ban('${esc(n.phrase||'')}','junk',this,'row-${i}')">🚫 Мусор</button>
        <button class="act-btn brand" onclick="ban('${esc(n.phrase||'')}','brand',this,'row-${i}')">™ Бренд</button>
      </td>
    </tr>`;
  }).join('');
}

async function ban(phrase, type, btn, rowId) {
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phrase, type })
    });
    if (type === 'brand') BRANDS.add(phrase.toLowerCase().trim());
    else BLACKLIST.add(phrase.toLowerCase().trim());
    const row = document.getElementById(rowId);
    if (row) {
      row.classList.add('banned');
      setTimeout(() => { row.style.display = 'none'; }, 600);
    }
  } catch(e) {
    btn.textContent = '!';
    btn.disabled = false;
  }
}

function setSort(field, btn) {
  if (sort === field) sortAsc = !sortAsc;
  else { sort = field; sortAsc = field === 'concurrency' || field === 'cards_count'; }
  ['th-req','th-cards','th-conc'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('sorted'); el.querySelector('.sort-ico').textContent = '↕'; }
  });
  const map = { request_count: 'th-req', cards_count: 'th-cards', concurrency: 'th-conc' };
  if (map[sort]) {
    const el = document.getElementById(map[sort]);
    if (el) { el.classList.add('sorted'); el.querySelector('.sort-ico').textContent = sortAsc ? '↑' : '↓'; }
  }
  if (btn) {
    btn.closest('.btn-grp').querySelectorAll('button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  }
  draw();
}

function setBrand(val, btn) {
  brandFilter = val;
  ['b-all','b-yes'].forEach(id => document.getElementById(id)?.classList.remove('on'));
  btn.classList.add('on');
  draw();
}
</script>
</body>
</html>

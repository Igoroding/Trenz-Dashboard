<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenz</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #ffffff;
  --bg2:       #f7f7f7;
  --bg3:       #efefef;
  --border:    #d8d8d8;
  --text:      #111111;
  --t2:        #444444;
  --t3:        #888888;
  --blue:      #1a56db;
  --blue-bg:   #eef3ff;
  --green:     #057a55;
  --green-bg:  #e8f8f0;
  --amber:     #b45309;
  --amber-bg:  #fef3c7;
  --red:       #c81e1e;
  --red-bg:    #fde8e8;
  --purple:    #6c2bd9;
  --purple-bg: #f3eeff;
}

body {
  font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.page { max-width: 1280px; margin: 0 auto; padding: 0 40px 80px; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 40px 0 36px;
  border-bottom: 2px solid var(--text);
  margin-bottom: 48px;
}
.logo { font-size: 48px; font-weight: 700; letter-spacing: -2px; line-height: 1; color: var(--text); }
.logo-z { color: var(--blue); }
.ts { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--t3); font-weight: 500; }
.ts-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* ── KPI ── */
.kpi-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 0; margin-bottom: 48px;
  border: 2px solid var(--text); border-radius: 0;
}
.kpi {
  padding: 28px 32px;
  border-right: 2px solid var(--text);
}
.kpi:last-child { border-right: none; }
.kpi-label {
  font-size: 12px; font-weight: 700; color: var(--t3);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}
.kpi-val {
  font-size: 48px; font-weight: 700;
  letter-spacing: -2px; line-height: 1;
}
.kv-g { color: var(--green); }
.kv-b { color: var(--blue); }
.kv-d { color: var(--text); }

/* ── AI BLOCK ── */
.ai-block {
  border: 2px solid var(--text);
  margin-bottom: 48px;
}
.ai-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 32px; cursor: pointer;
  background: var(--bg); transition: background 0.1s;
  border-bottom: 2px solid transparent; user-select: none;
}
.ai-header:hover { background: var(--bg2); }
.ai-header.open { border-bottom-color: var(--text); }
.ai-left { display: flex; align-items: center; gap: 16px; }
.ai-icon {
  width: 36px; height: 36px;
  background: var(--text); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; flex-shrink: 0;
}
.ai-name { font-size: 17px; font-weight: 700; }
.ai-sub { font-size: 12px; color: var(--t3); font-weight: 500; margin-top: 2px; }
.ai-chev { font-size: 13px; color: var(--t3); transition: transform 0.2s; font-weight: 700; }
.ai-chev.open { transform: rotate(180deg); }

.ai-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s;
  padding: 0 36px;
}
.ai-body.open { max-height: 6000px; padding: 36px; }

/* ── MARKDOWN ── */
.md { font-size: 16px; line-height: 1.8; color: var(--t2); }
.md h1 { font-size: 22px; font-weight: 700; color: var(--text); margin: 0 0 24px; letter-spacing: -0.5px; }
.md h2 {
  font-size: 18px; font-weight: 700; color: var(--text);
  margin: 36px 0 16px; padding-top: 28px;
  border-top: 2px solid var(--bg3);
}
.md h2:first-child { margin-top: 0; padding-top: 0; border-top: none; }
.md h3 { font-size: 15px; font-weight: 700; color: var(--text); margin: 24px 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.md p { margin-bottom: 16px; }
.md strong { font-weight: 700; color: var(--text); }
.md hr { border: none; border-top: 2px solid var(--bg3); margin: 28px 0; }
.md ul { list-style: none; padding: 0; margin: 0 0 18px; }
.md ul li { padding: 5px 0 5px 22px; position: relative; font-size: 16px; }
.md ul li::before { content: '—'; position: absolute; left: 0; color: var(--t3); font-weight: 700; }
.md ol { padding-left: 24px; margin-bottom: 18px; }
.md ol li { padding: 4px 0; font-size: 16px; }
.md table { width: 100%; border-collapse: collapse; margin: 16px 0 20px; font-size: 15px; }
.md th { text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--text); }
.md td { padding: 11px 16px; border-bottom: 1px solid var(--border); }
.md tr:last-child td { border-bottom: none; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 24px; flex-wrap: wrap;
}
.btn-grp {
  display: flex; border: 2px solid var(--text); overflow: hidden;
}
.btn-grp button {
  background: var(--bg); border: none; border-right: 2px solid var(--text);
  padding: 10px 20px; font-family: inherit;
  font-size: 14px; font-weight: 600; color: var(--t2);
  cursor: pointer; transition: background 0.1s, color 0.1s; white-space: nowrap;
}
.btn-grp button:last-child { border-right: none; }
.btn-grp button:hover { background: var(--bg2); }
.btn-grp button.on { background: var(--text); color: white; }

.search-wrap { margin-left: auto; position: relative; }
.search-wrap input {
  background: var(--bg); border: 2px solid var(--text);
  padding: 10px 16px 10px 40px;
  font-family: inherit; font-size: 15px; color: var(--text);
  outline: none; width: 240px; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--blue); }
.search-wrap input::placeholder { color: var(--t3); }
.search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 16px; pointer-events: none; }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 2px; background: var(--border);
  border: 2px solid var(--border);
}

.card {
  background: var(--bg);
  padding: 28px 28px 24px;
  transition: background 0.1s;
  animation: up 0.2s ease backwards;
}
.card:hover { background: var(--bg2); }
@keyframes up { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.card-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.card-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; font-weight: 500; color: var(--t3);
}
.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 11px; font-weight: 700; padding: 3px 9px;
  letter-spacing: 0.4px; text-transform: uppercase;
}
.tag-empty  { background: var(--green-bg); color: var(--green); }
.tag-free   { background: var(--blue-bg);  color: var(--blue); }
.tag-low    { background: var(--green-bg); color: var(--green); }
.tag-mid    { background: var(--amber-bg); color: var(--amber); }
.tag-hi     { background: var(--red-bg);   color: var(--red); }
.tag-brand  { background: var(--purple-bg);color: var(--purple); }

.card-phrase {
  font-size: 19px; font-weight: 700; color: var(--text);
  line-height: 1.25; margin-bottom: 5px; letter-spacing: -0.3px;
}
.card-cat {
  font-size: 12px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 20px;
}

.metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.metric { background: var(--bg2); padding: 12px 14px; }
.m-lbl { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
.m-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 17px; font-weight: 500; color: var(--text); line-height: 1;
}
.m-val.green { color: var(--green); }
.m-val.blue  { color: var(--blue); }

.bar { height: 4px; background: var(--bg3); }
.bar-fill { height: 100%; transition: width 0.6s ease; }

/* ── SETUP ── */
.setup {
  max-width: 560px; margin: 100px auto;
  border: 2px solid var(--text); padding: 56px 48px; text-align: center;
}
.setup-ico { font-size: 40px; margin-bottom: 20px; }
.setup-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
.setup-desc { font-size: 15px; color: var(--t2); line-height: 1.7; margin-bottom: 28px; }
.setup-desc code { font-family: 'IBM Plex Mono', monospace; font-size: 13px; background: var(--bg2); padding: 2px 8px; color: var(--blue); }
.input-row { display: flex; gap: 0; }
.gin {
  flex: 1; background: var(--bg); border: 2px solid var(--text); border-right: none;
  padding: 12px 16px; font-family: inherit; font-size: 14px; color: var(--text);
  outline: none;
}
.gin:focus { border-color: var(--blue); }
.gin::placeholder { color: var(--t3); }
.btn-p {
  background: var(--text); color: white; border: 2px solid var(--text);
  padding: 12px 24px; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
}
.btn-p:hover { opacity: 0.8; }
.err { background: var(--red-bg); padding: 12px 16px; color: var(--red); font-size: 14px; margin-top: 12px; text-align: left; border-left: 4px solid var(--red); }

/* ── LOADING ── */
.loading { text-align: center; padding: 120px 20px; }
.spin { width: 28px; height: 28px; margin: 0 auto 16px; border: 3px solid var(--bg3); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin-txt { font-size: 15px; color: var(--t3); font-weight: 500; }

.empty { grid-column: 1/-1; text-align: center; padding: 80px; color: var(--t3); font-size: 16px; }

footer { margin-top: 60px; padding-top: 24px; border-top: 2px solid var(--text); display: flex; justify-content: space-between; font-size: 12px; color: var(--t3); font-weight: 700; flex-wrap: wrap; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="logo">tren<span class="logo-z">z</span></div>
    <div class="ts"><div class="ts-dot"></div><span id="ts">—</span></div>
  </div>

  <!-- Setup -->
  <div id="setup" class="setup" style="display:none">
    <div class="setup-ico">📡</div>
    <div class="setup-title">Источник данных</div>
    <div class="setup-desc">Вставьте Raw URL вашего GitHub Gist<br><code>https://gist.githubusercontent.com/USER/ID/raw/FILE.json</code></div>
    <div class="input-row">
      <input class="gin" id="gin" type="text" placeholder="https://gist.githubusercontent.com/...">
      <button class="btn-p" onclick="saveLoad()">Загрузить</button>
    </div>
    <div id="errc" class="err" style="display:none"></div>
  </div>

  <!-- Main -->
  <div id="main" style="display:none">

    <div class="kpi-row" id="kpi"></div>

    <div class="ai-block" id="aib" style="display:none">
      <div class="ai-header open" id="aih" onclick="toggleAI()">
        <div class="ai-left">
          <div class="ai-icon">✦</div>
          <div>
            <div class="ai-name">AI‑анализ трендов</div>
            <div class="ai-sub">Wildberries · Claude Sonnet</div>
          </div>
        </div>
        <span class="ai-chev open" id="chev">▼</span>
      </div>
      <div class="ai-body open" id="ab"></div>
    </div>

    <div class="toolbar">
      <div class="btn-grp">
        <button class="on" onclick="setSort('concurrency',this)">Конкуренция</button>
        <button onclick="setSort('request_count',this)">Запросы</button>
        <button onclick="setSort('cards_count',this)">Карточки</button>
      </div>
      <div class="btn-grp">
        <button class="on" id="b-all" onclick="setBrand('no_brand',this)">Небрендовые</button>
        <button id="b-yes" onclick="setBrand('all',this)">+ Бренды</button>
      </div>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="sq" placeholder="Поиск..." oninput="draw()">
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div id="loading" class="loading" style="display:none">
    <div class="spin"></div>
    <div class="spin-txt">Загрузка данных...</div>
  </div>

  <footer>
    <span>Trenz — WB Market Intelligence</span>
    <span id="fu"></span>
  </footer>
</div>

<script>
const KEY = 'trenz_gist_v2';
const FIXED = 'https://gist.githubusercontent.com/Igoroding/114c03bcf98115a54fd6e72fecd28656/raw/trenz_data.json';
const BLACKLIST_URL = 'https://raw.githubusercontent.com/Igoroding/Trenz-Dashboard/main/blacklist.json';

let niches = [], sort = 'concurrency', brandFilter = 'no_brand';
// Webhook URL для добавления в блэклист — вставьте после импорта воркфлоу
const BLACKLIST_WEBHOOK = localStorage.getItem('trenz_webhook') || '';

async function banPhrase(phrase, btn) {
  if (!BLACKLIST_WEBHOOK) {
    const url = prompt('Введите URL вашего N8N webhook (trenz-blacklist):');
    if (!url) return;
    localStorage.setItem('trenz_webhook', url);
  }
  const webhookUrl = localStorage.getItem('trenz_webhook');
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phrase })
    });
    // Добавляем в локальный блэклист сразу
    BLACKLIST.add(phrase.toLowerCase().trim());
    btn.textContent = '✓';
    btn.style.background = 'var(--green)';
    btn.style.color = 'white';
    btn.style.borderColor = 'var(--green)';
    setTimeout(() => draw(), 800);
  } catch(e) {
    btn.textContent = '!';
    btn.disabled = false;
  }
}
let asc = { concurrency: true, request_count: false, cards_count: true };
let BLACKLIST = new Set();

fetch(BLACKLIST_URL + '?t=' + Date.now())
  .then(r => r.json())
  .then(arr => { BLACKLIST = new Set(arr.map(s => s.toLowerCase().trim())); draw(); })
  .catch(() => {});

const isJunk = p => {
  const s = (p||'').toLowerCase().trim();
  if (BLACKLIST.has(s)) return true;
  const CONTAINS = [
    'мои покупки','мои заказы','мой заказ','покупки мои','заказы мои',
    'посылка','авиабилет','билет на самолет','билет на самолёт',
    'квартира','аренда квартир','снять комнату',
    'рубли за отзыв','баллы за отзыв','за отзыв товар',
    'личный кабинет','скачать приложение','статус заказа',
    'возврат товар','вернуть товар','служба поддержки',
    'как оформить','как заказать','как оплатить',
    'пункт выдачи','пункт самовывоза',
  ];
  return CONTAINS.some(k => s.includes(k));
};

const fmt = n => Number(n).toLocaleString('ru');
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function md(text) {
  if (!text) return '';
  let h = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^[*\-] (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/^\|(.+)\|$/gm,(m,r)=>'<tr>'+r.split('|').map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>')
    .replace(/^<tr><td>[-: |]+<\/td><\/tr>$/gm,'');
  h = h.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  h = h.replace(/(<tr>[\s\S]*?<\/tr>\n?)+/g, m => `<table>${m}</table>`);
  h = h.split('\n').map(line => {
    const t = line.trim();
    if (!t) return '';
    if (/^<(h[123]|ul|ol|table|tr|td|th|hr)/.test(t)) return t;
    return `<p>${t}</p>`;
  }).join('\n');
  return h;
}

function saveLoad() {
  const u = document.getElementById('gin').value.trim();
  if (!u) return;
  localStorage.setItem(KEY, u);
  load(u);
}

async function load(url) {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    render(await r.json());
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('setup').style.display = 'block';
    const el = document.getElementById('errc');
    el.style.display = 'block';
    el.textContent = 'Ошибка: ' + e.message;
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  niches = data.niches || [];

  if (data.updated_at) {
    const d = new Date(data.updated_at);
    document.getElementById('ts').textContent =
      d.toLocaleString('ru', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  const cl = niches.filter(n => !isJunk(n.phrase||''));
  const empty = cl.filter(n => parseInt(n.cards_count||0) <= 5).length;
  const free  = cl.filter(n => { const c = parseInt(n.cards_count||0); return c > 5 && c <= 100; }).length;

  document.getElementById('kpi').innerHTML = `
    <div class="kpi"><div class="kpi-label">Трендов</div><div class="kpi-val kv-d">${cl.length}</div></div>
    <div class="kpi"><div class="kpi-label">Пустых (≤ 5 карточек)</div><div class="kpi-val kv-g">${empty}</div></div>
    <div class="kpi" style="border-right:none"><div class="kpi-label">Свободных (≤ 100 карточек)</div><div class="kpi-val kv-b">${free}</div></div>
  `;

  if (data.analysis) {
    document.getElementById('aib').style.display = 'block';
    document.getElementById('ab').innerHTML = '<div class="md">' + md(data.analysis) + '</div>';
  }
  document.getElementById('fu').textContent = localStorage.getItem(KEY) || '';
  draw();
}

function draw() {
  const q = document.getElementById('sq').value.toLowerCase();
  let list = niches.filter(n => {
    if (isJunk(n.phrase||'')) return false;
    if (brandFilter === 'no_brand' && n.is_brand) return false;
    if (q && !n.phrase?.toLowerCase().includes(q) && !n.category?.toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a, b) => {
    const av = parseFloat(a[sort]||0), bv = parseFloat(b[sort]||0);
    return asc[sort] ? av - bv : bv - av;
  });

  const g = document.getElementById('grid');
  if (!list.length) { g.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }

  g.innerHTML = list.map((n, i) => {
    const c     = parseFloat(n.concurrency||0);
    const cards = parseInt(n.cards_count||0);
    const req   = parseInt(n.request_count||0);
    const pct   = Math.min(c * 500, 100);
    const compCls = c < 0.001 ? 'tag-low' : c < 0.01 ? 'tag-mid' : 'tag-hi';
    const compLbl = c < 0.001 ? 'Низкая'  : c < 0.01 ? 'Средняя' : 'Высокая';
    const barCol  = c < 0.001 ? 'var(--green)' : c < 0.01 ? 'var(--amber)' : 'var(--red)';
    const cardCol = cards <= 5 ? 'green' : cards <= 100 ? 'blue' : '';
    return `<div class="card" style="animation-delay:${Math.min(i*0.012,0.3)}s">
      <div class="card-top">
        <span class="card-num">${String(i+1).padStart(2,'0')}</span>
        <div class="tags">
          ${cards <= 5 ? '<span class="tag tag-empty">Пустая</span>' : '<span class="tag tag-free">Свободная</span>'}
          <span class="tag ${compCls}">${compLbl}</span>
          ${n.is_brand ? '<span class="tag tag-brand">Бренд</span>' : ''}
        </div>
      </div>
      <div class="card-phrase">${esc(n.phrase||'')}</div>
      <div class="card-cat">${esc(n.category||'—')}</div>
      <div class="metrics">
        <div class="metric"><div class="m-lbl">Запросов/мес</div><div class="m-val">${fmt(req)}</div></div>
        <div class="metric"><div class="m-lbl">Карточек</div><div class="m-val ${cardCol}">${fmt(cards)}</div></div>
        <div class="metric"><div class="m-lbl">Конкуренция</div><div class="m-val">${c.toFixed(4)}</div></div>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${barCol}"></div></div>
      <div style="margin-top:12px;text-align:right">
        <button onclick="banPhrase('${esc(n.phrase||'')}',this)" style="font-family:inherit;font-size:11px;font-weight:700;color:var(--t3);background:transparent;border:1.5px solid var(--border);padding:4px 10px;cursor:pointer;letter-spacing:0.3px;text-transform:uppercase;transition:all 0.15s" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--t3)'">🚫 В блэклист</button>
      </div>
    </div>`;
  }).join('');
}

function setSort(f, btn) {
  if (sort === f) asc[f] = !asc[f]; else sort = f;
  btn.closest('.btn-grp').querySelectorAll('button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  draw();
}

function setBrand(val, btn) {
  brandFilter = val;
  ['b-all','b-yes'].forEach(id => document.getElementById(id) && document.getElementById(id).classList.remove('on'));
  btn.classList.add('on');
  draw();
}

function toggleAI() {
  document.getElementById('aih').classList.toggle('open');
  document.getElementById('ab').classList.toggle('open');
  document.getElementById('chev').classList.toggle('open');
}

const saved = localStorage.getItem(KEY) || FIXED;
document.getElementById('gin').value = saved;
load(saved);
setInterval(() => {
  if (document.getElementById('main').style.display !== 'none')
    load(localStorage.getItem(KEY) || FIXED);
}, 5 * 60 * 1000);
</script>
